  <script>
(function() {
  // ===== Fill with your real downloadable APK URLs =====
  const ARM64_URL = "https://iaqwuapjijgiorxtrhmq.supabase.co/storage/v1/object/public/bazarak/app-arm64-v8a-release.apk";
  const ARMV7_URL = "https://iaqwuapjijgiorxtrhmq.supabase.co/storage/v1/object/public/bazarak/app-armeabi-v7a-release.apk";
  const X86_URL   = "https://iaqwuapjijgiorxtrhmq.supabase.co/storage/v1/object/public/bazarak/app-x86_64-release.apk";
  const FALLBACK_URL = ARM64_URL;

  function detectOS() {
    const ua = navigator.userAgent || navigator.vendor || window.opera;
    if (/android/i.test(ua)) return "Android";
    if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) return "iOS";
    return "Other";
  }
  function detectAndroidAbi() {
    const ua = navigator.userAgent.toLowerCase();
    if (ua.includes("arm64") || ua.includes("aarch64")) return "arm64-v8a";
    if (ua.includes("armeabi") || ua.includes("armv7")) return "armeabi-v7a";
    if (ua.includes("x86_64")) return "x86_64";
    return "arm64-v8a"; // default for most new devices
  }

  const os = detectOS();
  const abi = (os === "Android") ? detectAndroidAbi() : null;

  function renderDownloadOptions() {
    const container = document.getElementById('download-options');
    if (!container) return;
    if (os === 'iOS') {
      container.innerHTML = `
        <div class="os-message" role="alert">
          <i class="fas fa-exclamation-circle" style="font-size: 2rem; margin-left: 0.8rem; vertical-align: middle;"></i>
          نسخه iOS فعلاً آماده نیست. بزودی ارائه می‌شود.
        </div>`;
    } else if (os === "Android") {
      container.innerHTML = `
        <div style="margin-bottom: 1.2rem;">
          <span style="background: #ecf9f2; padding: 0.4rem 1.5rem; border-radius: 3rem; font-size: 1rem;">
            <i class="fas fa-android" style="color:#4ECCA3;"></i> نسخه‌های اندروید مناسب موبایل شما
          </span>
        </div>
        <div class="android-buttons">
          <a href="${ARM64_URL}" class="apk-btn" rel="noopener noreferrer">
            <i class="fas fa-microchip"></i> دانلود نسخه ARM64
          </a>
          <a href="${ARMV7_URL}" class="apk-btn" rel="noopener noreferrer">
            <i class="fas fa-mobile-alt"></i> ARMv7 <span style="color:#888;font-size:0.93em;">(قدیمی‌ترها)</span>
          </a>
          <a href="${X86_URL}" class="apk-btn" rel="noopener noreferrer">
            <i class="fas fa-laptop-code"></i> x86_64 <span style="color:#888;font-size:0.93em;">(شبیه‌سازها)</span>
          </a>
        </div>
        <p class="small-note">
          <i class="fas fa-info-circle" style="color:#4ECCA3;"></i> معمولاً نسخه ARM64 برای اکثر گوشی‌های جدید مناسب است. اگر نصب نشد، نسخه دیگر را امتحان کنید.
        </p>
      `;
    } else {
      container.innerHTML = `
        <div class="os-message" role="alert">
          <i class="fas fa-desktop"></i> 
          دانلود فقط برای موبایل اندرویدی فعال است. فایل APK را به گوشی خود منتقل کنید.
        </div>
      `;
    }
  }
  renderDownloadOptions();

  var smartBtn = document.getElementById('smartDownloadBtn');
  if (smartBtn) {
    smartBtn.addEventListener('click', function(e) {
      e.preventDefault();
      if (os === "iOS") {
        document.getElementById('download')?.scrollIntoView({ behavior: 'smooth' });
        const msgBox = document.querySelector('.os-message');
        if (msgBox) {
          msgBox.style.transition = 'background 0.3s';
          msgBox.style.background = '#ffe5b4';
          setTimeout(() => msgBox.style.background = '', 350);
        }
      } else if (os === "Android") {
        if (abi === "arm64-v8a" && ARM64_URL) window.location.href = ARM64_URL;
        else if (abi === "armeabi-v7a" && ARMV7_URL) window.location.href = ARMV7_URL;
        else if (abi === "x86_64" && X86_URL) window.location.href = X86_URL;
        else window.location.href = FALLBACK_URL;
      } else {
        window.location.href = FALLBACK_URL;
      }
    });
  }

  document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function (e) {
      e.preventDefault();
      const target = document.querySelector(this.getAttribute('href'));
      if (target) target.scrollIntoView({ behavior: 'smooth' });
    });
  });
})();
  </script>
